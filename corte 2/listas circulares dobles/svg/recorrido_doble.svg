<svg viewBox="0 0 820 310" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background-color: white;">
    <defs>
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#495057" />
        </marker>
        <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#6f42c1" />
        </marker>
        <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#0056b3" />
        </marker>
        <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#dc3545" />
        </marker>
    </defs>

    <!-- Title -->
    <text x="410" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">Recorrido Bidireccional en Lista Circular Doble</text>

    <!-- cabeza label -->
    <text x="140" y="58" font-size="12" font-weight="bold" text-anchor="middle" fill="#0056b3">cabeza / inicio</text>
    <path d="M 140 62 L 140 80" stroke="#0056b3" stroke-width="2" marker-end="url(#arrowBlue)" fill="none"/>

    <!-- Node A at x=80 -->
    <g transform="translate(80, 82)">
        <rect x="0" y="0" width="120" height="40" rx="5" ry="5" fill="#e9ecef" stroke="#0056b3" stroke-width="2"/>
        <line x1="40" y1="0" x2="40" y2="40" stroke="#ced4da" stroke-width="1.5"/>
        <line x1="80" y1="0" x2="80" y2="40" stroke="#ced4da" stroke-width="1.5"/>
        <text x="20" y="25" font-size="11" text-anchor="middle" fill="#6f42c1">prev</text>
        <text x="60" y="26" font-size="17" font-weight="bold" text-anchor="middle" fill="#333">A</text>
        <text x="100" y="25" font-size="11" text-anchor="middle" fill="#495057">next</text>
    </g>

    <!-- Node B at x=300 -->
    <g transform="translate(300, 82)">
        <rect x="0" y="0" width="120" height="40" rx="5" ry="5" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
        <line x1="40" y1="0" x2="40" y2="40" stroke="#ced4da" stroke-width="1.5"/>
        <line x1="80" y1="0" x2="80" y2="40" stroke="#ced4da" stroke-width="1.5"/>
        <text x="20" y="25" font-size="11" text-anchor="middle" fill="#6f42c1">prev</text>
        <text x="60" y="26" font-size="17" font-weight="bold" text-anchor="middle" fill="#333">B</text>
        <text x="100" y="25" font-size="11" text-anchor="middle" fill="#495057">next</text>
    </g>

    <!-- Node C at x=520 -->
    <g transform="translate(520, 82)">
        <rect x="0" y="0" width="120" height="40" rx="5" ry="5" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
        <line x1="40" y1="0" x2="40" y2="40" stroke="#ced4da" stroke-width="1.5"/>
        <line x1="80" y1="0" x2="80" y2="40" stroke="#ced4da" stroke-width="1.5"/>
        <text x="20" y="25" font-size="11" text-anchor="middle" fill="#6f42c1">prev</text>
        <text x="60" y="26" font-size="17" font-weight="bold" text-anchor="middle" fill="#333">C</text>
        <text x="100" y="25" font-size="11" text-anchor="middle" fill="#495057">next</text>
    </g>

    <!-- === RECORRIDO HACIA ADELANTE (next, gray, bottom) === -->
    <!-- A→B (next) -->
    <path d="M 200 118 L 300 118" stroke="#495057" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
    <!-- B→C (next) -->
    <path d="M 420 118 L 520 118" stroke="#495057" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
    <!-- C→A circular (next, below) -->
    <path d="M 640 115 C 690 188 50 188 80 115"
          stroke="#dc3545" stroke-width="2" fill="none" marker-end="url(#arrowRed)" stroke-dasharray="6,3"/>

    <!-- Forward label -->
    <text x="370" y="175" font-size="12" font-weight="bold" text-anchor="middle" fill="#495057">→ Recorrido hacia adelante</text>
    <text x="370" y="191" font-size="11" text-anchor="middle" fill="#6c757d">actual = actual.siguiente  |  condición de parada: actual == cabeza</text>

    <!-- === RECORRIDO HACIA ATRÁS (prev, purple, top) === -->
    <!-- B←C (prev) -->
    <path d="M 520 95 L 420 95" stroke="#6f42c1" stroke-width="2.5" marker-end="url(#arrowPurple)" fill="none"/>
    <!-- A←B (prev) -->
    <path d="M 300 95 L 200 95" stroke="#6f42c1" stroke-width="2.5" marker-end="url(#arrowPurple)" fill="none"/>
    <!-- C←A circular (prev, above) -->
    <path d="M 80 95 C 30 25 690 25 640 95"
          stroke="#6f42c1" stroke-width="2" fill="none" marker-end="url(#arrowPurple)" stroke-dasharray="6,3"/>

    <!-- Backward label -->
    <text x="640" y="55" font-size="11" text-anchor="middle" fill="#6f42c1">A.prev → C</text>

    <!-- === CODE BLOCKS === -->
    <!-- Forward -->
    <rect x="50" y="210" width="320" height="74" rx="6" ry="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
    <text x="62" y="228" font-size="11" font-weight="bold" fill="#495057">Hacia adelante (siguiente):</text>
    <text x="62" y="246" font-size="11" fill="#333" font-family="Courier New, monospace">NodoDoble actual = cabeza;</text>
    <text x="62" y="262" font-size="11" fill="#333" font-family="Courier New, monospace">do &#123; procesar(actual);</text>
    <text x="62" y="278" font-size="11" fill="#333" font-family="Courier New, monospace">   actual = actual.siguiente;</text>
    <text x="62" y="294" font-size="11" fill="#333" font-family="Courier New, monospace">&#125; while (actual != cabeza);</text>

    <!-- Backward -->
    <rect x="450" y="210" width="320" height="74" rx="6" ry="6" fill="#f3e8ff" stroke="#d1b3ff" stroke-width="1.5"/>
    <text x="462" y="228" font-size="11" font-weight="bold" fill="#6f42c1">Hacia atrás (anterior):</text>
    <text x="462" y="246" font-size="11" fill="#333" font-family="Courier New, monospace">NodoDoble actual = cabeza.anterior;</text>
    <text x="462" y="262" font-size="11" fill="#333" font-family="Courier New, monospace">NodoDoble cola = actual;</text>
    <text x="462" y="278" font-size="11" fill="#333" font-family="Courier New, monospace">do &#123; procesar(actual);</text>
    <text x="462" y="294" font-size="11" fill="#333" font-family="Courier New, monospace">   actual = actual.anterior; &#125; while (actual != cola);</text>
</svg>
