<svg viewBox="0 0 820 320" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background-color: white;">
    <defs>
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#495057" />
        </marker>
        <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#6f42c1" />
        </marker>
        <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#0056b3" />
        </marker>
        <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#dc3545" />
        </marker>
        <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#28a745" />
        </marker>
    </defs>

    <!-- Title -->
    <text x="410" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">Lista Circular Doblemente Enlazada</text>

    <!-- cabeza pointer -->
    <text x="140" y="100" font-size="12" font-weight="bold" text-anchor="middle" fill="#0056b3">cabeza</text>
    <path d="M 140 104 L 140 123" stroke="#0056b3" stroke-width="2" marker-end="url(#arrowBlue)" fill="none"/>

    <!-- cola pointer -->
    <text x="560" y="100" font-size="12" font-weight="bold" text-anchor="middle" fill="#28a745">cola</text>
    <path d="M 560 104 L 560 123" stroke="#28a745" stroke-width="2" marker-end="url(#arrowGreen)" fill="none"/>

    <!-- Node A (cabeza) at x=80 -->
    <g transform="translate(80, 125)">
        <rect x="0" y="0" width="120" height="40" rx="5" ry="5" fill="#e9ecef" stroke="#0056b3" stroke-width="2"/>
        <line x1="40" y1="0" x2="40" y2="40" stroke="#ced4da" stroke-width="1.5"/>
        <line x1="80" y1="0" x2="80" y2="40" stroke="#ced4da" stroke-width="1.5"/>
        <text x="20" y="25" font-size="11" text-anchor="middle" fill="#6f42c1">prev</text>
        <text x="60" y="26" font-size="17" font-weight="bold" text-anchor="middle" fill="#333">A</text>
        <text x="100" y="25" font-size="11" text-anchor="middle" fill="#495057">next</text>
    </g>

    <!-- Node B at x=300 -->
    <g transform="translate(300, 125)">
        <rect x="0" y="0" width="120" height="40" rx="5" ry="5" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
        <line x1="40" y1="0" x2="40" y2="40" stroke="#ced4da" stroke-width="1.5"/>
        <line x1="80" y1="0" x2="80" y2="40" stroke="#ced4da" stroke-width="1.5"/>
        <text x="20" y="25" font-size="11" text-anchor="middle" fill="#6f42c1">prev</text>
        <text x="60" y="26" font-size="17" font-weight="bold" text-anchor="middle" fill="#333">B</text>
        <text x="100" y="25" font-size="11" text-anchor="middle" fill="#495057">next</text>
    </g>

    <!-- Node C (cola) at x=520 -->
    <g transform="translate(520, 125)">
        <rect x="0" y="0" width="120" height="40" rx="5" ry="5" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
        <line x1="40" y1="0" x2="40" y2="40" stroke="#28a745" stroke-width="1.5"/>
        <line x1="80" y1="0" x2="80" y2="40" stroke="#28a745" stroke-width="1.5"/>
        <text x="20" y="25" font-size="11" text-anchor="middle" fill="#6f42c1">prev</text>
        <text x="60" y="26" font-size="17" font-weight="bold" text-anchor="middle" fill="#333">C</text>
        <text x="100" y="25" font-size="11" text-anchor="middle" fill="#28a745">next</text>
    </g>

    <!-- NEXT arrows (y=155, lower area, gray) -->
    <!-- A.next → B -->
    <path d="M 200 155 L 300 155" stroke="#495057" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
    <!-- B.next → C -->
    <path d="M 420 155 L 520 155" stroke="#495057" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

    <!-- PREV arrows (y=140, upper area, purple, pointing left) -->
    <!-- B.prev → A -->
    <path d="M 300 140 L 200 140" stroke="#6f42c1" stroke-width="2" marker-end="url(#arrowPurple)" fill="none"/>
    <!-- C.prev → B -->
    <path d="M 520 140 L 420 140" stroke="#6f42c1" stroke-width="2" marker-end="url(#arrowPurple)" fill="none"/>

    <!-- Circular NEXT: C.next → A (below, dashed red) -->
    <path d="M 640 155 C 690 235 50 235 80 155"
          stroke="#dc3545" stroke-width="2" fill="none" marker-end="url(#arrowRed)" stroke-dasharray="6,3"/>
    <text x="700" y="220" font-size="11" text-anchor="start" fill="#dc3545">C.next → A</text>
    <text x="700" y="235" font-size="11" text-anchor="start" fill="#dc3545">(cabeza)</text>

    <!-- Circular PREV: A.prev → C (above, dashed purple) -->
    <path d="M 80 140 C 30 55 690 55 640 140"
          stroke="#6f42c1" stroke-width="2" fill="none" marker-end="url(#arrowPurple)" stroke-dasharray="6,3"/>
    <text x="350" y="42" font-size="11" text-anchor="middle" fill="#6f42c1">A.prev → C (cola)</text>

    <!-- Legend -->
    <line x1="50" y1="292" x2="80" y2="292" stroke="#495057" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="86" y="296" font-size="11" fill="#495057">next (siguiente)</text>
    <line x1="210" y1="292" x2="240" y2="292" stroke="#6f42c1" stroke-width="2" marker-end="url(#arrowPurple)"/>
    <text x="246" y="296" font-size="11" fill="#6f42c1">prev (anterior)</text>
    <line x1="370" y1="292" x2="400" y2="292" stroke="#dc3545" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
    <text x="406" y="296" font-size="11" fill="#dc3545">next circular (cola → cabeza)</text>
    <line x1="610" y1="292" x2="640" y2="292" stroke="#6f42c1" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>
    <text x="646" y="296" font-size="11" fill="#6f42c1">prev circular</text>
</svg>
