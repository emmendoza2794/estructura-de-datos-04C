<svg viewBox="0 0 700 295" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background-color: white;">
    <defs>
        <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
            <path d="M0,0 L0,9 L9,4.5 z" fill="#28a745" />
        </marker>
        <marker id="arrowBlue" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
            <path d="M0,0 L0,9 L9,4.5 z" fill="#0056b3" />
        </marker>
        <marker id="arrowRed" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
            <path d="M0,0 L0,9 L9,4.5 z" fill="#dc3545" />
        </marker>
    </defs>

    <!-- Title -->
    <text x="350" y="22" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Operación DEQUEUE — Extraer por la salida (izquierda)</text>

    <!-- ═══ ANTES ═══ -->
    <text x="163" y="44" font-size="13" font-weight="bold" text-anchor="middle" fill="#555">ANTES</text>

    <!-- Exit arrow (leftward, dashed red) -->
    <path d="M 50 82 L 12 82" stroke="#dc3545" stroke-width="2.5" marker-end="url(#arrowRed)" fill="none" stroke-dasharray="5,3"/>
    <text x="31" y="74" font-size="10" font-weight="bold" text-anchor="middle" fill="#dc3545">10</text>

    <!-- Node 10 (salida, blue) -->
    <rect x="50" y="54" width="52" height="55" rx="5" fill="#cfe2ff" stroke="#0056b3" stroke-width="2.5"/>
    <text x="76" y="87" font-size="18" font-weight="bold" text-anchor="middle" fill="#0056b3">10</text>

    <!-- Node 25 -->
    <rect x="108" y="54" width="52" height="55" rx="5" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
    <text x="134" y="87" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">25</text>

    <!-- Node 8 -->
    <rect x="166" y="54" width="52" height="55" rx="5" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
    <text x="192" y="87" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">8</text>

    <!-- Node 42 (entrada, green) -->
    <rect x="224" y="54" width="52" height="55" rx="5" fill="#d1f5d3" stroke="#28a745" stroke-width="2.5"/>
    <text x="250" y="87" font-size="18" font-weight="bold" text-anchor="middle" fill="#28a745">42</text>

    <!-- ANTES pointers -->
    <path d="M 76 140 L 76 112" stroke="#0056b3" stroke-width="1.8" marker-end="url(#arrowBlue)" fill="none"/>
    <text x="76" y="155" font-size="11" font-weight="bold" text-anchor="middle" fill="#0056b3">salida</text>

    <path d="M 250 140 L 250 112" stroke="#28a745" stroke-width="1.8" marker-end="url(#arrowGreen)" fill="none"/>
    <text x="250" y="155" font-size="11" font-weight="bold" text-anchor="middle" fill="#28a745">entrada</text>

    <!-- ═══ Central transition arrow (wide area) ═══ -->
    <path d="M 288 82 L 364 82" stroke="#dc3545" stroke-width="3" marker-end="url(#arrowRed)" fill="none"/>
    <text x="326" y="72" font-size="12" font-weight="bold" text-anchor="middle" fill="#dc3545">dequeue()</text>
    <text x="326" y="98" font-size="12" text-anchor="middle" fill="#dc3545">retorna 10</text>

    <!-- ═══ DESPUÉS ═══ -->
    <text x="524" y="44" font-size="13" font-weight="bold" text-anchor="middle" fill="#555">DESPUÉS</text>

    <!-- Node 25 (nueva salida, blue) -->
    <rect x="378" y="54" width="58" height="55" rx="5" fill="#cfe2ff" stroke="#0056b3" stroke-width="2.5"/>
    <text x="407" y="87" font-size="18" font-weight="bold" text-anchor="middle" fill="#0056b3">25</text>

    <!-- Node 8 -->
    <rect x="442" y="54" width="58" height="55" rx="5" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
    <text x="471" y="87" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">8</text>

    <!-- Node 42 (entrada, green) -->
    <rect x="506" y="54" width="58" height="55" rx="5" fill="#d1f5d3" stroke="#28a745" stroke-width="2.5"/>
    <text x="535" y="87" font-size="18" font-weight="bold" text-anchor="middle" fill="#28a745">42</text>

    <!-- DESPUÉS pointers -->
    <path d="M 407 140 L 407 112" stroke="#0056b3" stroke-width="1.8" marker-end="url(#arrowBlue)" fill="none"/>
    <text x="407" y="155" font-size="11" font-weight="bold" text-anchor="middle" fill="#0056b3">salida</text>

    <path d="M 535 140 L 535 112" stroke="#28a745" stroke-width="1.8" marker-end="url(#arrowGreen)" fill="none"/>
    <text x="535" y="155" font-size="11" font-weight="bold" text-anchor="middle" fill="#28a745">entrada</text>

    <!-- Explanation box -->
    <rect x="30" y="172" width="640" height="105" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
    <text x="350" y="192" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">¿Qué ocurrió?</text>
    <text x="350" y="212" font-size="12" text-anchor="middle" fill="#555">1. Se guardó el dato del nodo salida (10) para retornarlo.</text>
    <text x="350" y="232" font-size="12" text-anchor="middle" fill="#555">2. El puntero <tspan font-weight="bold" fill="#0056b3">salida</tspan> avanzó al siguiente nodo (25).</text>
    <text x="350" y="252" font-size="12" text-anchor="middle" fill="#555">3. El nodo 10 quedó liberado. El puntero <tspan font-weight="bold" fill="#28a745">entrada</tspan> no cambió.</text>
</svg>
