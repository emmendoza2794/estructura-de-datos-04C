<svg viewBox="0 0 700 310" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background-color: white;">
    <defs>
        <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
            <path d="M0,0 L0,9 L9,4.5 z" fill="#28a745" />
        </marker>
        <marker id="arrowBlue" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
            <path d="M0,0 L0,9 L9,4.5 z" fill="#0056b3" />
        </marker>
        <marker id="arrowRed" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
            <path d="M0,0 L0,9 L9,4.5 z" fill="#dc3545" />
        </marker>
        <marker id="arrowBlue2" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
            <path d="M0,0 L0,9 L9,4.5 z" fill="#0056b3" />
        </marker>
    </defs>

    <!-- Title -->
    <text x="350" y="24" font-size="17" font-weight="bold" text-anchor="middle" fill="#333">Operación DEQUEUE — Extraer por la salida (derecha)</text>

    <!-- ═══ ANTES ═══ -->
    <text x="190" y="50" font-size="13" font-weight="bold" text-anchor="middle" fill="#555">ANTES</text>

    <!-- 4 nodes: 42 (entrada), 8, 25, 10 (salida) — left to right -->
    <rect x="55"  y="65" width="80" height="68" rx="5" fill="#d1f5d3" stroke="#28a745" stroke-width="2.5"/>
    <text x="95"  y="106" font-size="20" font-weight="bold" text-anchor="middle" fill="#28a745">42</text>

    <rect x="140" y="65" width="80" height="68" rx="5" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
    <text x="180" y="106" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">8</text>

    <rect x="225" y="65" width="80" height="68" rx="5" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
    <text x="265" y="106" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">25</text>

    <!-- salida node (rightmost) — about to exit -->
    <rect x="310" y="65" width="80" height="68" rx="5" fill="#cfe2ff" stroke="#0056b3" stroke-width="2.5"/>
    <text x="350" y="100" font-size="20" font-weight="bold" text-anchor="middle" fill="#0056b3">10</text>
    <text x="350" y="117" font-size="9"  text-anchor="middle" fill="#dc3545">← sale</text>

    <!-- exit arrow (rightward from node 10) -->
    <path d="M 390 99 L 420 99" stroke="#dc3545" stroke-width="3" marker-end="url(#arrowRed)" fill="none" stroke-dasharray="5,3"/>
    <text x="440" y="91"  font-size="11" font-weight="bold" text-anchor="middle" fill="#dc3545">sale</text>
    <text x="440" y="107" font-size="11" text-anchor="middle" fill="#dc3545">dato=10</text>

    <!-- pointers before -->
    <path d="M 95 158 L 95 136" stroke="#28a745" stroke-width="1.8" marker-end="url(#arrowGreen)" fill="none"/>
    <text x="95" y="172" font-size="11" font-weight="bold" text-anchor="middle" fill="#28a745">entrada</text>

    <path d="M 350 158 L 350 136" stroke="#0056b3" stroke-width="1.8" marker-end="url(#arrowBlue)" fill="none"/>
    <text x="350" y="172" font-size="11" font-weight="bold" text-anchor="middle" fill="#0056b3">salida</text>

    <!-- ═══ central arrow ═══ -->
    <path d="M 458 99 L 495 99" stroke="#dc3545" stroke-width="3" marker-end="url(#arrowRed)" fill="none"/>
    <text x="476" y="90"  font-size="11" font-weight="bold" text-anchor="middle" fill="#dc3545">dequeue()</text>
    <text x="476" y="113" font-size="11" text-anchor="middle" fill="#dc3545">retorna 10</text>

    <!-- ═══ DESPUÉS ═══ -->
    <text x="600" y="50" font-size="13" font-weight="bold" text-anchor="middle" fill="#555">DESPUÉS</text>

    <!-- 3 nodes: 42 (entrada), 8, 25 (nueva salida) -->
    <rect x="510" y="65" width="80" height="68" rx="5" fill="#d1f5d3" stroke="#28a745" stroke-width="2.5"/>
    <text x="550" y="106" font-size="20" font-weight="bold" text-anchor="middle" fill="#28a745">42</text>

    <rect x="595" y="65" width="80" height="68" rx="5" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
    <text x="635" y="106" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">8</text>

    <!-- 25 is off-screen, indicate -->
    <text x="692" y="103" font-size="14" fill="#0056b3">→25</text>

    <!-- pointers after -->
    <path d="M 550 158 L 550 136" stroke="#28a745" stroke-width="1.8" marker-end="url(#arrowGreen)" fill="none"/>
    <text x="550" y="172" font-size="11" font-weight="bold" text-anchor="middle" fill="#28a745">entrada</text>

    <text x="653" y="172" font-size="11" text-anchor="middle" fill="#0056b3">salida → 25</text>

    <!-- explanation box -->
    <rect x="30" y="195" width="640" height="90" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
    <text x="350" y="218" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">¿Qué ocurrió?</text>
    <text x="350" y="238" font-size="12" text-anchor="middle" fill="#555">1. Se guardó el dato del nodo salida (10) para retornarlo.</text>
    <text x="350" y="256" font-size="12" text-anchor="middle" fill="#555">2. El puntero <tspan font-weight="bold" fill="#0056b3">salida</tspan> avanzó al siguiente nodo (25).</text>
    <text x="350" y="274" font-size="12" text-anchor="middle" fill="#555">3. El nodo 10 quedó liberado. El puntero <tspan font-weight="bold" fill="#28a745">entrada</tspan> no cambió.</text>
</svg>
