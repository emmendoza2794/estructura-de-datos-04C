<svg viewBox="0 0 700 295" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background-color: white;">
    <defs>
        <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
            <path d="M0,0 L0,9 L9,4.5 z" fill="#28a745" />
        </marker>
        <marker id="arrowBlue" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
            <path d="M0,0 L0,9 L9,4.5 z" fill="#0056b3" />
        </marker>
        <marker id="arrowOrange" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
            <path d="M0,0 L0,9 L9,4.5 z" fill="#e67e00" />
        </marker>
    </defs>

    <!-- Title -->
    <text x="350" y="22" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Operación ENQUEUE — Insertar por la entrada (derecha)</text>

    <!-- ═══ ANTES ═══ -->
    <text x="102" y="44" font-size="13" font-weight="bold" text-anchor="middle" fill="#555">ANTES</text>

    <!-- Node 10 (salida, blue) -->
    <rect x="18" y="54" width="52" height="55" rx="5" fill="#cfe2ff" stroke="#0056b3" stroke-width="2.5"/>
    <text x="44" y="87" font-size="18" font-weight="bold" text-anchor="middle" fill="#0056b3">10</text>

    <!-- Node 25 -->
    <rect x="76" y="54" width="52" height="55" rx="5" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
    <text x="102" y="87" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">25</text>

    <!-- Node 8 (entrada, green) -->
    <rect x="134" y="54" width="52" height="55" rx="5" fill="#d1f5d3" stroke="#28a745" stroke-width="2.5"/>
    <text x="160" y="87" font-size="18" font-weight="bold" text-anchor="middle" fill="#28a745">8</text>

    <!-- ANTES pointers -->
    <path d="M 44 140 L 44 112" stroke="#0056b3" stroke-width="1.8" marker-end="url(#arrowBlue)" fill="none"/>
    <text x="44" y="155" font-size="11" font-weight="bold" text-anchor="middle" fill="#0056b3">salida</text>

    <path d="M 160 140 L 160 112" stroke="#28a745" stroke-width="1.8" marker-end="url(#arrowGreen)" fill="none"/>
    <text x="160" y="155" font-size="11" font-weight="bold" text-anchor="middle" fill="#28a745">entrada</text>

    <!-- ═══ Central transition arrow (wide area) ═══ -->
    <path d="M 202 82 L 278 82" stroke="#e67e00" stroke-width="3" marker-end="url(#arrowOrange)" fill="none"/>
    <text x="240" y="72" font-size="12" font-weight="bold" text-anchor="middle" fill="#e67e00">enqueue</text>
    <text x="240" y="98" font-size="12" text-anchor="middle" fill="#e67e00">(42)</text>

    <!-- ═══ DESPUÉS ═══ -->
    <text x="470" y="44" font-size="13" font-weight="bold" text-anchor="middle" fill="#555">DESPUÉS</text>

    <!-- 10 off-screen to the left -->
    <text x="290" y="86" font-size="13" font-weight="bold" fill="#0056b3">10→</text>

    <!-- Node 25 -->
    <rect x="316" y="54" width="52" height="55" rx="5" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
    <text x="342" y="87" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">25</text>

    <!-- Node 8 -->
    <rect x="374" y="54" width="52" height="55" rx="5" fill="#d1f5d3" stroke="#28a745" stroke-width="2"/>
    <text x="400" y="87" font-size="18" font-weight="bold" text-anchor="middle" fill="#28a745">8</text>

    <!-- Node 42 (nueva entrada, orange) -->
    <rect x="432" y="54" width="52" height="55" rx="5" fill="#fff3cd" stroke="#e67e00" stroke-width="2.5"/>
    <text x="458" y="83" font-size="18" font-weight="bold" text-anchor="middle" fill="#e67e00">42</text>
    <text x="458" y="99" font-size="9" text-anchor="middle" fill="#e67e00">nuevo</text>

    <!-- Entry arrow from right (dashed) -->
    <path d="M 570 82 L 486 82" stroke="#e67e00" stroke-width="2.5" marker-end="url(#arrowOrange)" fill="none" stroke-dasharray="4,3"/>

    <!-- DESPUÉS pointers -->
    <text x="342" y="155" font-size="11" text-anchor="middle" fill="#0056b3">salida → 10</text>

    <path d="M 458 140 L 458 112" stroke="#e67e00" stroke-width="1.8" marker-end="url(#arrowOrange)" fill="none"/>
    <text x="458" y="155" font-size="11" font-weight="bold" text-anchor="middle" fill="#e67e00">entrada</text>

    <!-- Explanation box -->
    <rect x="30" y="172" width="640" height="105" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
    <text x="350" y="192" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">¿Qué ocurrió?</text>
    <text x="350" y="212" font-size="12" text-anchor="middle" fill="#555">1. Se creó un nuevo nodo con dato = 42.</text>
    <text x="350" y="232" font-size="12" text-anchor="middle" fill="#555">2. El antiguo nodo entrada (8) enlazó su puntero siguiente al nuevo nodo.</text>
    <text x="350" y="252" font-size="12" text-anchor="middle" fill="#555">3. <tspan font-weight="bold" fill="#e67e00">entrada</tspan> apuntó al nuevo nodo (42). El puntero <tspan font-weight="bold" fill="#0056b3">salida</tspan> no cambió.</text>
</svg>
