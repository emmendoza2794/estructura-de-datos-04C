<svg viewBox="0 0 700 310" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background-color: white;">
    <defs>
        <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
            <path d="M0,0 L0,9 L9,4.5 z" fill="#28a745" />
        </marker>
        <marker id="arrowBlue" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
            <path d="M0,0 L0,9 L9,4.5 z" fill="#0056b3" />
        </marker>
        <marker id="arrowOrange" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
            <path d="M0,0 L0,9 L9,4.5 z" fill="#e67e00" />
        </marker>
        <marker id="arrowRed" markerWidth="9" markerHeight="9" refX="9" refY="4.5" orient="auto">
            <path d="M0,0 L0,9 L9,4.5 z" fill="#dc3545" />
        </marker>
    </defs>

    <!-- Title -->
    <text x="350" y="24" font-size="17" font-weight="bold" text-anchor="middle" fill="#333">Operación ENQUEUE — Insertar por la entrada (izquierda)</text>

    <!-- ═══ ANTES ═══ -->
    <text x="200" y="50" font-size="13" font-weight="bold" text-anchor="middle" fill="#555">ANTES</text>

    <!-- 3 nodes: 8 (entrada), 25, 10 (salida) — left to right -->
    <rect x="80"  y="65" width="90" height="68" rx="5" fill="#d1f5d3" stroke="#28a745" stroke-width="2.5"/>
    <text x="125" y="106" font-size="20" font-weight="bold" text-anchor="middle" fill="#28a745">8</text>

    <rect x="175" y="65" width="90" height="68" rx="5" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
    <text x="220" y="106" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">25</text>

    <rect x="270" y="65" width="90" height="68" rx="5" fill="#cfe2ff" stroke="#0056b3" stroke-width="2.5"/>
    <text x="315" y="106" font-size="20" font-weight="bold" text-anchor="middle" fill="#0056b3">10</text>

    <!-- pointers before -->
    <path d="M 125 158 L 125 136" stroke="#28a745" stroke-width="1.8" marker-end="url(#arrowGreen)" fill="none"/>
    <text x="125" y="172" font-size="11" font-weight="bold" text-anchor="middle" fill="#28a745">entrada</text>

    <path d="M 315 158 L 315 136" stroke="#0056b3" stroke-width="1.8" marker-end="url(#arrowBlue)" fill="none"/>
    <text x="315" y="172" font-size="11" font-weight="bold" text-anchor="middle" fill="#0056b3">salida</text>

    <!-- ═══ central arrow ═══ -->
    <path d="M 390 99 L 430 99" stroke="#e67e00" stroke-width="3" marker-end="url(#arrowOrange)" fill="none"/>
    <text x="410" y="90"  font-size="11" font-weight="bold" text-anchor="middle" fill="#e67e00">enqueue</text>
    <text x="410" y="115" font-size="11" text-anchor="middle" fill="#e67e00">(42)</text>

    <!-- ═══ DESPUÉS ═══ -->
    <text x="570" y="50" font-size="13" font-weight="bold" text-anchor="middle" fill="#555">DESPUÉS</text>

    <!-- 4 nodes: 42 (nueva entrada), 8, 25, 10 (salida) — enter from left -->
    <!-- Entry arrow -->
    <path d="M 445 99 L 462 99" stroke="#e67e00" stroke-width="2.5" marker-end="url(#arrowOrange)" fill="none" stroke-dasharray="4,3"/>

    <rect x="462" y="65" width="72" height="68" rx="5" fill="#fff3cd" stroke="#e67e00" stroke-width="2.5"/>
    <text x="498" y="100" font-size="20" font-weight="bold" text-anchor="middle" fill="#e67e00">42</text>
    <text x="498" y="117" font-size="9"  text-anchor="middle" fill="#e67e00">nuevo</text>

    <rect x="538" y="65" width="72" height="68" rx="5" fill="#d1f5d3" stroke="#28a745" stroke-width="2"/>
    <text x="574" y="106" font-size="20" font-weight="bold" text-anchor="middle" fill="#28a745">8</text>

    <rect x="614" y="65" width="72" height="68" rx="5" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
    <text x="650" y="106" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">25</text>

    <!-- 10 is off-screen to the right — indicate with ... -->
    <text x="696" y="103" font-size="14" fill="#999">→10</text>

    <!-- pointers after -->
    <path d="M 498 158 L 498 136" stroke="#e67e00" stroke-width="1.8" marker-end="url(#arrowOrange)" fill="none"/>
    <text x="498" y="172" font-size="11" font-weight="bold" text-anchor="middle" fill="#e67e00">entrada</text>

    <!-- salida stays at 10 (off-screen, just indicate) -->
    <text x="650" y="172" font-size="11" text-anchor="middle" fill="#0056b3">salida → 10</text>

    <!-- explanation box -->
    <rect x="30" y="195" width="640" height="90" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
    <text x="350" y="218" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">¿Qué ocurrió?</text>
    <text x="350" y="238" font-size="12" text-anchor="middle" fill="#555">1. Se creó un nuevo nodo con dato = 42.</text>
    <text x="350" y="256" font-size="12" text-anchor="middle" fill="#555">2. El antiguo nodo entrada (8) enlazó su puntero siguiente al nuevo nodo.</text>
    <text x="350" y="274" font-size="12" text-anchor="middle" fill="#555">3. <tspan font-weight="bold" fill="#e67e00">entrada</tspan> apuntó al nuevo nodo (42). El puntero <tspan font-weight="bold" fill="#0056b3">salida</tspan> no cambió.</text>
</svg>
