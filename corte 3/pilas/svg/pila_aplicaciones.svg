<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background-color: white;">

    <text x="380" y="26" font-size="17" font-weight="bold" text-anchor="middle" fill="#333">Aplicaciones Reales de las Pilas</text>

    <!-- Card 1: Deshacer -->
    <rect x="30" y="45" width="160" height="145" rx="10" fill="#cfe2ff" stroke="#0056b3" stroke-width="2"/>
    <text x="110" y="72" font-size="13" font-weight="bold" text-anchor="middle" fill="#0056b3">Ctrl+Z / Deshacer</text>
    <text x="110" y="95" font-size="28" text-anchor="middle">↩️</text>
    <text x="110" y="130" font-size="10" text-anchor="middle" fill="#333">Cada acción del usuario</text>
    <text x="110" y="145" font-size="10" text-anchor="middle" fill="#333">se apila. Al deshacer,</text>
    <text x="110" y="160" font-size="10" text-anchor="middle" fill="#333">se hace pop de la última</text>
    <text x="110" y="175" font-size="10" text-anchor="middle" fill="#333">acción ejecutada.</text>

    <!-- Card 2: Pila de llamadas -->
    <rect x="205" y="45" width="160" height="145" rx="10" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
    <text x="285" y="72" font-size="13" font-weight="bold" text-anchor="middle" fill="#28a745">Call Stack</text>
    <text x="285" y="95" font-size="28" text-anchor="middle">⚙️</text>
    <text x="285" y="130" font-size="10" text-anchor="middle" fill="#333">El programa apila marcos</text>
    <text x="285" y="145" font-size="10" text-anchor="middle" fill="#333">de cada función llamada.</text>
    <text x="285" y="160" font-size="10" text-anchor="middle" fill="#333">Al retornar, se hace pop</text>
    <text x="285" y="175" font-size="10" text-anchor="middle" fill="#333">del marco actual.</text>

    <!-- Card 3: Navegador -->
    <rect x="380" y="45" width="160" height="145" rx="10" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
    <text x="460" y="72" font-size="13" font-weight="bold" text-anchor="middle" fill="#856404">Historial Web</text>
    <text x="460" y="95" font-size="28" text-anchor="middle">🌐</text>
    <text x="460" y="130" font-size="10" text-anchor="middle" fill="#333">Cada URL visitada se</text>
    <text x="460" y="145" font-size="10" text-anchor="middle" fill="#333">apila. El botón "Atrás"</text>
    <text x="460" y="160" font-size="10" text-anchor="middle" fill="#333">hace pop para regresar</text>
    <text x="460" y="175" font-size="10" text-anchor="middle" fill="#333">a la página anterior.</text>

    <!-- Card 4: Balanceo de paréntesis -->
    <rect x="555" y="45" width="175" height="145" rx="10" fill="#f8d7da" stroke="#dc3545" stroke-width="2"/>
    <text x="642" y="65" font-size="12" font-weight="bold" text-anchor="middle" fill="#dc3545">Balanceo de</text>
    <text x="642" y="80" font-size="12" font-weight="bold" text-anchor="middle" fill="#dc3545">Paréntesis / Brackets</text>
    <text x="642" y="105" font-size="22" text-anchor="middle">{ [ ( ) ] }</text>
    <text x="642" y="130" font-size="10" text-anchor="middle" fill="#333">Se apila cada símbolo</text>
    <text x="642" y="145" font-size="10" text-anchor="middle" fill="#333">de apertura. Al hallar</text>
    <text x="642" y="160" font-size="10" text-anchor="middle" fill="#333">cierre, se verifica con</text>
    <text x="642" y="175" font-size="10" text-anchor="middle" fill="#333">el tope de la pila.</text>

    <!-- Bottom note -->
    <rect x="30" y="210" width="700" height="72" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
    <text x="380" y="232" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Ejercicio de clase — Balanceo de paréntesis</text>
    <text x="380" y="252" font-size="11" text-anchor="middle" fill="#555">Entrada: "{ ( [ ] ) }"  →  cada apertura se apila; cada cierre se compara con el tope</text>
    <text x="380" y="270" font-size="11" text-anchor="middle" fill="#555">Si al final la pila está vacía: expresión VÁLIDA  |  Si hay elementos: expresión INVÁLIDA</text>
</svg>
