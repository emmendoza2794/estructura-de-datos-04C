<svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background-color: white;">
    <defs>
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#495057" />
        </marker>
        <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#dc3545" />
        </marker>
        <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#0056b3" />
        </marker>
    </defs>

    <text x="350" y="25" font-size="17" font-weight="bold" text-anchor="middle" fill="#333">Operación POP — Desapilar un elemento</text>

    <!-- BEFORE label -->
    <text x="155" y="55" font-size="14" font-weight="bold" text-anchor="middle" fill="#555">ANTES</text>

    <!-- Stack BEFORE -->
    <line x1="100" y1="65" x2="100" y2="295" stroke="#495057" stroke-width="2.5"/>
    <line x1="210" y1="65" x2="210" y2="295" stroke="#495057" stroke-width="2.5"/>
    <line x1="100" y1="295" x2="210" y2="295" stroke="#495057" stroke-width="2.5"/>
    <rect x="103" y="230" width="104" height="60" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="1.5"/>
    <text x="155" y="265" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">10</text>
    <rect x="103" y="165" width="104" height="60" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="1.5"/>
    <text x="155" y="200" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">25</text>
    <rect x="103" y="100" width="104" height="60" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="1.5"/>
    <text x="155" y="135" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">8</text>
    <!-- top element to be removed -->
    <rect x="103" y="68" width="104" height="27" rx="3" fill="#f8d7da" stroke="#dc3545" stroke-width="2.5"/>
    <text x="155" y="87" font-size="16" font-weight="bold" text-anchor="middle" fill="#dc3545">42</text>
    <!-- tope before -->
    <text x="68" y="84" font-size="11" font-weight="bold" text-anchor="middle" fill="#0056b3">tope</text>
    <path d="M 83 84 L 100 84" stroke="#0056b3" stroke-width="2" marker-end="url(#arrowBlue)" fill="none"/>

    <!-- element flying out -->
    <path d="M 155 65 L 155 30" stroke="#dc3545" stroke-width="2.5" marker-end="url(#arrowRed)" fill="none"/>
    <text x="175" y="48" font-size="11" fill="#dc3545">retorna 42</text>

    <!-- Arrow between states -->
    <path d="M 240 180 L 320 180" stroke="#495057" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
    <text x="280" y="172" font-size="12" text-anchor="middle" fill="#555">pop()</text>

    <!-- AFTER label -->
    <text x="495" y="55" font-size="14" font-weight="bold" text-anchor="middle" fill="#555">DESPUÉS</text>

    <!-- Stack AFTER -->
    <line x1="440" y1="65" x2="440" y2="295" stroke="#495057" stroke-width="2.5"/>
    <line x1="550" y1="65" x2="550" y2="295" stroke="#495057" stroke-width="2.5"/>
    <line x1="440" y1="295" x2="550" y2="295" stroke="#495057" stroke-width="2.5"/>
    <rect x="443" y="230" width="104" height="60" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="1.5"/>
    <text x="495" y="265" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">10</text>
    <rect x="443" y="165" width="104" height="60" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="1.5"/>
    <text x="495" y="200" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">25</text>
    <!-- new top -->
    <rect x="443" y="100" width="104" height="60" rx="3" fill="#cfe2ff" stroke="#0056b3" stroke-width="2"/>
    <text x="495" y="135" font-size="16" font-weight="bold" text-anchor="middle" fill="#0056b3">8</text>
    <!-- tope after -->
    <text x="408" y="130" font-size="11" font-weight="bold" text-anchor="middle" fill="#0056b3">tope</text>
    <path d="M 423 130 L 440 130" stroke="#0056b3" stroke-width="2" marker-end="url(#arrowBlue)" fill="none"/>

    <!-- Pseudocode box -->
    <rect x="570" y="100" width="120" height="100" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
    <text x="630" y="118" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Pseudocódigo</text>
    <text x="580" y="135" font-size="10" fill="#333">si tope == null:</text>
    <text x="588" y="150" font-size="10" fill="#dc3545">  error "vacía"</text>
    <text x="580" y="165" font-size="10" fill="#333">dato = tope.dato</text>
    <text x="580" y="180" font-size="10" fill="#333">tope = tope.next</text>
    <text x="580" y="195" font-size="10" fill="#333">tamaño--</text>

    <text x="350" y="320" font-size="12" text-anchor="middle" fill="#555">Complejidad: <tspan font-weight="bold" fill="#0056b3">O(1)</tspan> — siempre se extrae del tope</text>
</svg>
