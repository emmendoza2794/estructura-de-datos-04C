<svg viewBox="0 0 780 380" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background-color: white;">
    <defs>
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#495057" />
        </marker>
        <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#0056b3" />
        </marker>
    </defs>

    <text x="390" y="26" font-size="17" font-weight="bold" text-anchor="middle" fill="#333">Implementaciones de la Pila</text>

    <!-- ===== LEFT: Array implementation ===== -->
    <text x="185" y="55" font-size="14" font-weight="bold" text-anchor="middle" fill="#555">Usando Array (Arreglo)</text>

    <!-- Array cells -->
    <rect x="50" y="70" width="60" height="50" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
    <text x="80" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">10</text>
    <text x="80" y="135" font-size="11" text-anchor="middle" fill="#888">[0]</text>

    <rect x="110" y="70" width="60" height="50" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
    <text x="140" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">25</text>
    <text x="140" y="135" font-size="11" text-anchor="middle" fill="#888">[1]</text>

    <rect x="170" y="70" width="60" height="50" rx="3" fill="#cfe2ff" stroke="#0056b3" stroke-width="2.5"/>
    <text x="200" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#0056b3">8</text>
    <text x="200" y="135" font-size="11" text-anchor="middle" fill="#888">[2]</text>

    <rect x="230" y="70" width="60" height="50" rx="3" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="260" y="100" font-size="18" text-anchor="middle" fill="#ccc">—</text>
    <text x="260" y="135" font-size="11" text-anchor="middle" fill="#ccc">[3]</text>

    <rect x="290" y="70" width="60" height="50" rx="3" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="320" y="100" font-size="18" text-anchor="middle" fill="#ccc">—</text>
    <text x="320" y="135" font-size="11" text-anchor="middle" fill="#ccc">[4]</text>

    <!-- tope index pointer -->
    <text x="200" y="65" font-size="11" font-weight="bold" text-anchor="middle" fill="#0056b3">tope=2</text>

    <!-- Array pros/cons -->
    <rect x="50" y="155" width="300" height="130" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
    <text x="200" y="174" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Características</text>
    <text x="62" y="193" font-size="11" fill="#28a745">✓ Acceso directo por índice</text>
    <text x="62" y="210" font-size="11" fill="#28a745">✓ Mejor uso de caché</text>
    <text x="62" y="227" font-size="11" fill="#28a745">✓ Sin overhead de punteros</text>
    <text x="62" y="247" font-size="11" fill="#dc3545">✗ Tamaño fijo (capacidad máx.)</text>
    <text x="62" y="264" font-size="11" fill="#dc3545">✗ Posible desbordamiento</text>
    <text x="62" y="281" font-size="11" fill="#dc3545">✗ Memoria pre-asignada</text>

    <!-- ===== RIGHT: Linked List implementation ===== -->
    <text x="590" y="55" font-size="14" font-weight="bold" text-anchor="middle" fill="#555">Usando Lista Enlazada</text>

    <!-- Nodes -->
    <!-- tope pointer -->
    <text x="430" y="88" font-size="11" font-weight="bold" text-anchor="middle" fill="#0056b3">tope</text>
    <path d="M 455 88 L 473 88" stroke="#0056b3" stroke-width="2" marker-end="url(#arrowBlue)" fill="none"/>

    <!-- Node 8 (top) -->
    <g transform="translate(475, 70)">
        <rect x="0" y="0" width="90" height="36" rx="4" fill="#cfe2ff" stroke="#0056b3" stroke-width="2"/>
        <line x1="55" y1="0" x2="55" y2="36" stroke="#0056b3" stroke-width="1.5"/>
        <text x="27" y="23" font-size="16" font-weight="bold" text-anchor="middle" fill="#0056b3">8</text>
        <text x="72" y="23" font-size="11" text-anchor="middle" fill="#495057">next</text>
    </g>
    <!-- arrow to next node -->
    <path d="M 565 88 L 590 88" stroke="#495057" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

    <!-- Node 25 -->
    <g transform="translate(592, 70)">
        <rect x="0" y="0" width="90" height="36" rx="4" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
        <line x1="55" y1="0" x2="55" y2="36" stroke="#ced4da" stroke-width="1.5"/>
        <text x="27" y="23" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">25</text>
        <text x="72" y="23" font-size="11" text-anchor="middle" fill="#495057">next</text>
    </g>
    <path d="M 682 88 L 700 88" stroke="#495057" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

    <!-- Node 10 -->
    <g transform="translate(702, 70)">
        <rect x="0" y="0" width="65" height="36" rx="4" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
        <line x1="45" y1="0" x2="45" y2="36" stroke="#ced4da" stroke-width="1.5"/>
        <text x="22" y="23" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">10</text>
        <text x="55" y="23" font-size="11" text-anchor="middle" fill="#888">null</text>
    </g>

    <!-- Linked list pros/cons -->
    <rect x="430" y="155" width="300" height="130" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
    <text x="580" y="174" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Características</text>
    <text x="442" y="193" font-size="11" fill="#28a745">✓ Tamaño dinámico (ilimitado)</text>
    <text x="442" y="210" font-size="11" fill="#28a745">✓ Sin desbordamiento</text>
    <text x="442" y="227" font-size="11" fill="#28a745">✓ Memoria exacta usada</text>
    <text x="442" y="247" font-size="11" fill="#dc3545">✗ Overhead por puntero extra</text>
    <text x="442" y="264" font-size="11" fill="#dc3545">✗ Acceso no contiguo</text>
    <text x="442" y="281" font-size="11" fill="#dc3545">✗ Peor uso de caché</text>

    <!-- Divider -->
    <line x1="390" y1="50" x2="390" y2="310" stroke="#dee2e6" stroke-width="1.5" stroke-dasharray="6,4"/>

    <!-- Complexity table -->
    <rect x="150" y="310" width="480" height="60" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="1.5"/>
    <text x="390" y="330" font-size="12" font-weight="bold" text-anchor="middle" fill="#856404">Complejidad de operaciones (ambas implementaciones)</text>
    <text x="230" y="350" font-size="11" text-anchor="middle" fill="#333">push():  O(1)</text>
    <text x="390" y="350" font-size="11" text-anchor="middle" fill="#333">pop():  O(1)</text>
    <text x="560" y="350" font-size="11" text-anchor="middle" fill="#333">peek():  O(1)</text>
    <text x="390" y="365" font-size="11" text-anchor="middle" fill="#333">isEmpty() / size():  O(1)</text>
</svg>
