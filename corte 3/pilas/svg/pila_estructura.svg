<svg viewBox="0 0 500 420" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background-color: white;">
    <defs>
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#495057" />
        </marker>
        <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#0056b3" />
        </marker>
        <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#dc3545" />
        </marker>
    </defs>

    <!-- Title -->
    <text x="250" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">Estructura de una Pila (Stack)</text>

    <!-- Stack container (open top) -->
    <line x1="160" y1="60" x2="160" y2="370" stroke="#495057" stroke-width="3"/>
    <line x1="340" y1="60" x2="340" y2="370" stroke="#495057" stroke-width="3"/>
    <line x1="160" y1="370" x2="340" y2="370" stroke="#495057" stroke-width="3"/>
    <text x="250" y="398" font-size="12" text-anchor="middle" fill="#888">base (fondo)</text>

    <!-- Open top indicator -->
    <text x="250" y="55" font-size="11" text-anchor="middle" fill="#888">↑ abierta por arriba</text>

    <!-- Element 1 (bottom) -->
    <rect x="165" y="310" width="170" height="55" rx="4" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
    <text x="250" y="343" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">10</text>
    <text x="250" y="358" font-size="10" text-anchor="middle" fill="#888">primero en entrar</text>

    <!-- Element 2 -->
    <rect x="165" y="250" width="170" height="55" rx="4" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
    <text x="250" y="283" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">25</text>

    <!-- Element 3 -->
    <rect x="165" y="190" width="170" height="55" rx="4" fill="#e9ecef" stroke="#ced4da" stroke-width="2"/>
    <text x="250" y="223" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">8</text>

    <!-- Element 4 (top) - highlighted -->
    <rect x="165" y="130" width="170" height="55" rx="4" fill="#cfe2ff" stroke="#0056b3" stroke-width="2.5"/>
    <text x="250" y="163" font-size="18" font-weight="bold" text-anchor="middle" fill="#0056b3">42</text>
    <text x="250" y="178" font-size="10" text-anchor="middle" fill="#0056b3">último en entrar</text>

    <!-- tope pointer -->
    <text x="115" y="158" font-size="12" font-weight="bold" text-anchor="middle" fill="#0056b3">tope</text>
    <path d="M 148 158 L 163 158" stroke="#0056b3" stroke-width="2" marker-end="url(#arrowBlue)" fill="none"/>

    <!-- LIFO label -->
    <rect x="360" y="120" width="110" height="50" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
    <text x="415" y="141" font-size="12" font-weight="bold" text-anchor="middle" fill="#856404">L I F O</text>
    <text x="415" y="157" font-size="10" text-anchor="middle" fill="#856404">Last In, First Out</text>

    <!-- Push / Pop arrows on the side -->
    <path d="M 390 80 L 340 105" stroke="#28a745" stroke-width="2" marker-end="url(#arrow)" fill="none" stroke-dasharray="4,3"/>
    <text x="400" y="76" font-size="12" font-weight="bold" fill="#28a745">PUSH</text>
    <text x="400" y="89" font-size="10" fill="#28a745">(apilar)</text>

    <path d="M 340 95 L 390 70" stroke="#dc3545" stroke-width="2" marker-end="url(#arrowRed)" fill="none" stroke-dasharray="4,3"/>
    <text x="395" y="64" font-size="12" font-weight="bold" fill="#dc3545">POP</text>
    <text x="395" y="77" font-size="10" fill="#dc3545">(desapilar)</text>

    <!-- Analogy label -->
    <text x="250" y="415" font-size="11" text-anchor="middle" fill="#555">Analogía: pila de platos — siempre sirves el de arriba</text>
</svg>
