<svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background-color: white;">
    <defs>
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#495057" />
        </marker>
        <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#28a745" />
        </marker>
        <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
            <path d="M0,0 L0,8 L8,4 z" fill="#0056b3" />
        </marker>
    </defs>

    <text x="350" y="25" font-size="17" font-weight="bold" text-anchor="middle" fill="#333">Operación PUSH — Apilar un elemento</text>

    <!-- BEFORE label -->
    <text x="155" y="55" font-size="14" font-weight="bold" text-anchor="middle" fill="#555">ANTES</text>

    <!-- Stack BEFORE -->
    <line x1="100" y1="65" x2="100" y2="295" stroke="#495057" stroke-width="2.5"/>
    <line x1="210" y1="65" x2="210" y2="295" stroke="#495057" stroke-width="2.5"/>
    <line x1="100" y1="295" x2="210" y2="295" stroke="#495057" stroke-width="2.5"/>
    <!-- elements -->
    <rect x="103" y="230" width="104" height="60" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="1.5"/>
    <text x="155" y="265" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">10</text>
    <rect x="103" y="165" width="104" height="60" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="1.5"/>
    <text x="155" y="200" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">25</text>
    <rect x="103" y="100" width="104" height="60" rx="3" fill="#cfe2ff" stroke="#0056b3" stroke-width="2"/>
    <text x="155" y="135" font-size="16" font-weight="bold" text-anchor="middle" fill="#0056b3">8</text>
    <!-- tope before -->
    <text x="68" y="130" font-size="11" font-weight="bold" text-anchor="middle" fill="#0056b3">tope</text>
    <path d="M 83 130 L 100 130" stroke="#0056b3" stroke-width="2" marker-end="url(#arrowBlue)" fill="none"/>

    <!-- new element coming in -->
    <rect x="103" y="25" width="104" height="40" rx="3" fill="#d4edda" stroke="#28a745" stroke-width="2.5" stroke-dasharray="5,3"/>
    <text x="155" y="50" font-size="16" font-weight="bold" text-anchor="middle" fill="#28a745">42</text>
    <path d="M 155 68 L 155 97" stroke="#28a745" stroke-width="2.5" marker-end="url(#arrowGreen)" fill="none"/>
    <text x="175" y="85" font-size="11" fill="#28a745">push(42)</text>

    <!-- Arrow between states -->
    <path d="M 240 180 L 320 180" stroke="#495057" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
    <text x="280" y="172" font-size="12" text-anchor="middle" fill="#555">push</text>

    <!-- AFTER label -->
    <text x="495" y="55" font-size="14" font-weight="bold" text-anchor="middle" fill="#555">DESPUÉS</text>

    <!-- Stack AFTER -->
    <line x1="440" y1="65" x2="440" y2="295" stroke="#495057" stroke-width="2.5"/>
    <line x1="550" y1="65" x2="550" y2="295" stroke="#495057" stroke-width="2.5"/>
    <line x1="440" y1="295" x2="550" y2="295" stroke="#495057" stroke-width="2.5"/>
    <!-- elements after -->
    <rect x="443" y="230" width="104" height="60" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="1.5"/>
    <text x="495" y="265" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">10</text>
    <rect x="443" y="165" width="104" height="60" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="1.5"/>
    <text x="495" y="200" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">25</text>
    <rect x="443" y="100" width="104" height="60" rx="3" fill="#e9ecef" stroke="#ced4da" stroke-width="1.5"/>
    <text x="495" y="135" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">8</text>
    <!-- new top element -->
    <rect x="443" y="68" width="104" height="27" rx="3" fill="#d4edda" stroke="#28a745" stroke-width="2.5"/>
    <text x="495" y="87" font-size="16" font-weight="bold" text-anchor="middle" fill="#28a745">42</text>
    <!-- tope after -->
    <text x="408" y="84" font-size="11" font-weight="bold" text-anchor="middle" fill="#28a745">tope</text>
    <path d="M 423 84 L 440 84" stroke="#28a745" stroke-width="2" marker-end="url(#arrowGreen)" fill="none"/>

    <!-- Pseudocode box -->
    <rect x="570" y="100" width="120" height="90" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
    <text x="630" y="118" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">Pseudocódigo</text>
    <text x="580" y="135" font-size="10" fill="#333">nuevo = Nodo(dato)</text>
    <text x="580" y="150" font-size="10" fill="#333">nuevo.next = tope</text>
    <text x="580" y="165" font-size="10" fill="#333">tope = nuevo</text>
    <text x="580" y="180" font-size="10" fill="#333">tamaño++</text>

    <!-- Complexity -->
    <text x="350" y="320" font-size="12" text-anchor="middle" fill="#555">Complejidad: <tspan font-weight="bold" fill="#0056b3">O(1)</tspan> — siempre se inserta en el tope</text>
</svg>
